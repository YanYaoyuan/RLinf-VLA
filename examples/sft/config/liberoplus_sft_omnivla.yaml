defaults:
  - model/omni_vla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "liberoplus_sft_omnivla"
    logger_backends: ["wandb"] # wandb, swanlab

  max_epochs: 60000
  max_steps: -1
  val_check_interval: -1
  save_interval: 10000

data:
  train_data_paths: "/root/autodl-tmp/env/libero_plus_lerobot"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 128
  seed: 0

  # Override the default values in model/omni_vla
  model:
    precision: null
    model_path: "/root/autodl-tmp/checkpoints/omnivla_base/OmniVLA-base"
    num_action_chunks: 4 # interface for the env
    add_value_head: False
    omni_vla:
      config_name: "omni_libero"
      detach_critic_input: True

  optim:
    lr: 2.5e-5  
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08  
    weight_decay: 1.0e-10  
    clip_grad: 1.0
    warmup_style: "cosine"  
    lr_warmup_steps: 1000  
    total_training_steps: 60000  # for lr scheduler cosine decay

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: True
    gradient_checkpointing: False # for omnivla, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False